version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-pipeline

  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: mock_server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-pipeline
    environment:
      FLASK_ENV: production

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: Dockerfile
    container_name: pipeline_service
    ports:
      - "8000:8000"
    depends_on:
      - mock-server
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/customer_db
      FLASK_URL: http://mock-server:5000
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  data-pipeline:
    driver: bridge
